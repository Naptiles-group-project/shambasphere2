<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShambaSphere Marketplace</title>
<link rel="stylesheet" href="marketplace.css">
</head>
<body>

<!-- NAVIGATION BAR -->
<header class="navbar">
    <div class="logo">ShambaSphere</div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Categories</a>
        <a href="#">Farmers</a>
        <a href="#">Advisory</a>
        <a href="#">Contact</a>
    </nav>

    <div class="nav-right">
        <input type="text" id="searchInput" placeholder="Search products...">
        <div class="cart-icon" onclick="toggleCart()">
            🛒 <span id="cartCount">0</span>
        </div>
    </div>
</header>

<!-- HERO CAROUSEL -->
<section class="carousel">
    <div class="slides">
        <div class="slide active">Fresh Farm Produce</div>
        <div class="slide">Buy Direct from Farmers</div>
        <div class="slide">Best Prices Guaranteed</div>
    </div>
</section>

<!-- CATEGORIES -->
<section class="categories">
    <div class="category">🌽 Grains</div>
    <div class="category">🥬 Vegetables</div>
    <div class="category">🍎 Fruits</div>
    <div class="category">🐄 Livestock</div>
</section>

<!-- PRODUCTS -->
<section class="products-section">
    <h2>Available Products</h2>
    <div id="productsContainer" class="products-grid"></div>
</section>

<!-- CART SIDEBAR -->
<div class="cart-sidebar" id="cartSidebar">
    <h3>Your Cart</h3>
    <div id="cartItems"></div>
    <button onclick="checkout()">Checkout</button>
</div>

<script src="marketplace.js"></script>
</body>
</html>
